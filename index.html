<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación de Matemáticas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- MathJax para renderizar expresiones matemáticas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
</head>
<body>
    <div class="presentation-container">
        <!-- Header con título y controles -->
        <header class="header">
            <div class="header-content">
                <h1 class="presentation-title">Fundamentos de Matemáticas</h1>
                <div class="header-controls">
                    <button id="themeBtn" class="btn btn-icon" title="Cambiar tema">
                        <svg id="themeIcon" viewBox="0 0 24 24" width="20" height="20">
                            <!-- Icono de luna (para modo claro) -->
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button id="fullscreenBtn" class="btn btn-icon" title="Pantalla completa">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Barra de progreso -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Área principal de diapositivas -->
        <main class="slides-container">
            <div class="slide-wrapper" id="slideWrapper">
                <!-- Las diapositivas se cargarán aquí con JavaScript -->
            </div>
        </main>

        <!-- Footer con controles de navegación -->
        <footer class="footer">
            <div class="footer-content">
                <button id="prevBtn" class="btn btn-nav" title="Diapositiva anterior">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                    </svg>
                </button>

                <div class="slide-counter">
                    <span id="currentSlide">1</span> / <span id="totalSlides">10</span>
                </div>

                <button id="nextBtn" class="btn btn-nav" title="Siguiente diapositiva">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="slides-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
